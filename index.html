<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guadalupe & Ayrton — Nos Casamos</title>
  <meta name="description" content="Casamiento de Guadalupe y Ayrton — 3 de Octubre, 2026">
  <meta property="og:title" content="Guadalupe & Ayrton — Nos Casamos">
  <meta property="og:description" content="3 de Octubre, 2026">
  <meta property="og:image" content="https://chichex.github.io/assets/espejo-atardecer.png">
  <meta property="og:url" content="https://chichex.github.io">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://chichex.github.io/assets/espejo-atardecer.png">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      background-color: #F5F0E8;
    }

    body {
      margin: 0 auto;
      max-width: 430px;
      background-color: #F5F0E8;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ========================================
       LOADER
       ======================================== */
    .loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #F5F0E8;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }
    .loader.is-hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader__spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #DDBEA9;
      border-top-color: #9C5540;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ========================================
       SITE WRAPPER
       ======================================== */
    .site {
      position: relative;
      width: 100%;
      line-height: 0;
    }

    .site__image {
      display: block;
      width: 100%;
      height: auto;
      position: relative;
      z-index: 2;
      pointer-events: none;
    }

    /* ========================================
       VIDEO (behind image, in transparent hole)
       ======================================== */
    .site__video {
      position: absolute;
      top: 12.46%;
      left: 0;
      width: 100%;
      height: 19.61%;
      object-fit: cover;
      z-index: 1;
    }

    /* ========================================
       INTERACTIVE BUTTONS (invisible overlays)
       ======================================== */
    .site__btn {
      position: absolute;
      z-index: 3;
      display: block;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 0;
      /* Center horizontally with consistent width */
      left: 50%;
      transform: translateX(-50%);
      width: 35%;
      height: 1.5%;
      min-height: 44px;
      /* Debug: uncomment to see button areas */
      /* background: rgba(255, 0, 0, 0.2); */
    }

    .site__btn:focus-visible {
      outline: 2px solid #C9A96E;
      outline-offset: 3px;
    }

    /* Button positions (Y center as % of total image height) */
    .site__btn--ceremonia { top: 46.7%; transform: translateX(-50%) translateY(-50%); }
    .site__btn--recepcion { top: 53.2%; transform: translateX(-50%) translateY(-50%); }
    .site__btn--alias     { top: 77.9%; transform: translateX(-50%) translateY(-50%); }
    .site__btn--guada     { top: 85.4%; transform: translateX(-50%) translateY(-50%); min-height: 38px; }
    .site__btn--chiche    { top: 86.8%; transform: translateX(-50%) translateY(-50%); min-height: 38px; }

    /* ========================================
       COPY TOAST (feedback when alias copied)
       ======================================== */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: #6B705C;
      color: #FAF7F2;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      line-height: 1.4;
    }
    .toast.is-visible {
      opacity: 1;
    }

    /* ========================================
       ACCESSIBILITY
       ======================================== */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>

  <!-- LOADER -->
  <div class="loader" id="loader" aria-label="Cargando">
    <div class="loader__spinner"></div>
  </div>

  <!-- SITE -->
  <div class="site">

    <!-- Video (behind image, visible through transparent hole) -->
    <video class="site__video" muted autoplay loop playsinline preload="metadata"
           poster="assets/espejo-atardecer.png">
      <source src="assets/hero-video.mp4" type="video/mp4">
    </video>

    <!-- Full design image -->
    <picture>
      <source media="(max-width: 375px)" srcset="assets/tarjeta%20resolucion%20375%20px_-02-02.png">
      <img class="site__image" src="assets/tarjeta%20resolucion%20430%20px_g_Mesa%20de%20trabajo%201.png"
           alt="Invitación de casamiento de Guadalupe y Ayrton — 3 de Octubre, 2026">
    </picture>

    <!-- Interactive buttons (invisible, overlaid on clickable areas) -->
    <a class="site__btn site__btn--ceremonia"
       href="https://maps.google.com/?q=Iglesia+Catedral+San+Luis+Argentina"
       target="_blank" rel="noopener noreferrer"
       aria-label="Cómo llegar a la Ceremonia — Iglesia Catedral, San Luis">
    </a>

    <a class="site__btn site__btn--recepcion"
       href="https://maps.google.com/?q=Mirna+Eventos+San+Luis+Argentina"
       target="_blank" rel="noopener noreferrer"
       aria-label="Cómo llegar a la Recepción — Salón Mirna Eventos">
    </a>

    <button class="site__btn site__btn--alias" id="copyBtn" type="button"
            aria-label="Copiar alias ayrtonmarini.mp al portapapeles">
    </button>

    <a class="site__btn site__btn--guada"
       href="https://wa.me/5492664301974"
       target="_blank" rel="noopener noreferrer"
       aria-label="Confirmar asistencia con Guada por WhatsApp">
    </a>

    <a class="site__btn site__btn--chiche"
       href="https://wa.me/598098145888"
       target="_blank" rel="noopener noreferrer"
       aria-label="Confirmar asistencia con Chiche por WhatsApp">
    </a>

  </div>

  <!-- Toast for clipboard feedback -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <!-- JAVASCRIPT -->
  <script>
    (function () {
      'use strict';

      /* ========================================
         LOADER
         ======================================== */
      var loader = document.getElementById('loader');

      function hideLoader() {
        if (loader.classList.contains('is-hidden')) return;
        loader.classList.add('is-hidden');
        loader.addEventListener('transitionend', function () {
          loader.remove();
        }, { once: true });
      }

      window.addEventListener('load', hideLoader);
      setTimeout(hideLoader, 8000);

      /* ========================================
         COPY ALIAS
         ======================================== */
      var copyBtn = document.getElementById('copyBtn');
      var toast = document.getElementById('toast');
      var toastTimeout;

      function showToast(message) {
        clearTimeout(toastTimeout);
        toast.textContent = message;
        toast.classList.add('is-visible');
        toastTimeout = setTimeout(function () {
          toast.classList.remove('is-visible');
        }, 2500);
      }

      copyBtn.addEventListener('click', function () {
        var alias = 'ayrtonmarini.mp';

        function onSuccess() {
          showToast('¡Alias copiado al portapapeles!');
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(alias).then(onSuccess).catch(function () {
            fallbackCopy(alias, onSuccess);
          });
        } else {
          fallbackCopy(alias, onSuccess);
        }
      });

      function fallbackCopy(text, cb) {
        var textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        try {
          document.execCommand('copy');
          cb();
        } catch (e) {
          showToast('No se pudo copiar. Copiá manualmente: ' + text);
        }
        document.body.removeChild(textarea);
      }

    })();
  </script>
</body>
</html>
